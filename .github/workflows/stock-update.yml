name: Stock Market Update

on:
  schedule:
    # Market hours in IST (UTC+5:30) converted to UTC
    - cron: '45 3 * * 1-5'  # 9:15 AM IST (Monday-Friday)
    - cron: '30 5 * * 1-5'  # 11:00 AM IST (Monday-Friday)
    - cron: '30 7 * * 1-5'  # 1:00 PM IST (Monday-Friday)
    - cron: '0 9 * * 1-5'   # 2:30 PM IST (Monday-Friday)
    - cron: '0 10 * * 1-5'  # 3:30 PM IST (Monday-Friday)
  workflow_dispatch: # Allow manual trigger

jobs:
  update-stocks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests flask fake-useragent python-dotenv pandas rich

    - name: Create .env file
      run: |
        echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
        echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

    - name: Run stock update script
      run: python app.py