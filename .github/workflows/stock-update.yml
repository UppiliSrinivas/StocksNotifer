name: Stock Market Update

on:
  schedule:
    # 9:15 AM IST onwards, every 5 minutes for 5 runs (9:15, 9:20, 9:25, 9:30, 9:35 AM IST)
    # IST = UTC + 5:30, so 9:15 AM IST = 3:45 AM UTC
    - cron: '45 3 * * 1-5'  # 9:15 AM IST
    - cron: '50 3 * * 1-5'  # 9:20 AM IST
    - cron: '55 3 * * 1-5'  # 9:25 AM IST
    - cron: '0 4 * * 1-5'   # 9:30 AM IST
    - cron: '5 4 * * 1-5'   # 9:35 AM IST
  workflow_dispatch: # Allow manual trigger

jobs:
  update-stocks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify secrets are configured
      run: |
        if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] || [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
          echo "ERROR: TELEGRAM_BOT_TOKEN and/or TELEGRAM_CHAT_ID secrets are not configured!"
          echo "Please add them in: Settings → Secrets and variables → Actions"
          exit 1
        fi
        echo "✓ Secrets are configured"

    - name: Create .env file
      run: |
        echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
        echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
        echo "✓ .env file created"

    - name: Run stock update script
      run: python app.py
      continue-on-error: true

    - name: Check execution status
      if: success()
      run: echo "✓ Stock update completed successfully"

    - name: Notify on failure
      if: failure()
      run: echo "⚠ Stock update encountered an error - check logs above"
